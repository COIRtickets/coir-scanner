<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>COIR Ticket Scanner</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    :root {
      --navy: #071d3a;
      --blue: #0d63c7;
      --ice: #eaf6ff;
      --green: #0f8f4f;
      --red: #c62828;
      --amber: #c77700;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(160deg, var(--navy), #0b376d);
      color: white;
      min-height: 100vh;
      text-align: center;
    }
    .wrap {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 28px 18px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.25);
    }
    h1 { margin: 0 0 8px; font-size: 34px; }
    .sub { opacity: .9; margin-bottom: 20px; }
    #reader {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      margin: 18px auto;
      max-width: 430px;
      color: #111;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 15px 22px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin: 8px;
    }
    .primary { background: var(--ice); color: var(--navy); }
    .secondary { background: transparent; border: 1px solid rgba(255,255,255,.45); color: white; }
    .status {
      display: none;
      margin-top: 20px;
      border-radius: 22px;
      padding: 28px 18px;
      font-size: 22px;
      font-weight: 800;
    }
    .valid { background: var(--green); }
    .invalid { background: var(--red); }
    .checking { background: var(--amber); }
    .ticket {
      font-size: 18px;
      font-weight: 600;
      word-break: break-word;
      opacity: .95;
      margin-top: 10px;
    }
    .small {
      font-size: 13px;
      opacity: .8;
      line-height: 1.5;
      margin-top: 18px;
    }
    input {
      width: 100%;
      max-width: 430px;
      padding: 14px;
      border-radius: 12px;
      border: 0;
      margin-top: 12px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>COIR Ticket Scanner</h1>
      <div class="sub">Canterbury Olympic Ice Rink check-in</div>

      <button class="primary" onclick="startScanner()">Start Scanner</button>
      <button class="secondary" onclick="stopScanner()">Stop</button>

      <div id="reader"></div>

      <div>
        <input id="manualTicket" placeholder="Or type Ticket ID manually" />
        <button class="primary" onclick="manualCheck()">Check Ticket</button>
      </div>

      <div id="status" class="status"></div>

      <div class="small">
        This scanner sends the ticket ID to your Zapier scanner webhook.
        Replace https://hooks.zapier.com/hooks/catch/28099949/42e77ah/ inside this file before publishing.
      </div>
    </div>
  </div>

<script>
  // IMPORTANT:
  // Paste your Zapier scanner webhook URL between the quotes below.
  const ZAPIER_WEBHOOK_URL = "https://hooks.zapier.com/hooks/catch/28099949/42e77ah/";

  let html5QrCode = null;
  let scanningLocked = false;

  function showStatus(type, title, ticket) {
    const box = document.getElementById("status");
    box.className = "status " + type;
    box.style.display = "block";
    box.innerHTML = title + (ticket ? `<div class="ticket">${ticket}</div>` : "");
  }

  async function sendToZapier(ticketId) {
    if (!ticketId) return;
    if (scanningLocked) return;

    scanningLocked = true;
    showStatus("checking", "Checking ticket...", ticketId);

    try {
      const url = ZAPIER_WEBHOOK_URL + "?ticket=" + encodeURIComponent(ticketId.trim());
      await fetch(url, { method: "GET", mode: "no-cors" });

      // Zapier Catch Hook cannot send a visible response back to this static page on no-cors.
      // This screen confirms the scan was submitted. Duplicate prevention happens in Zapier/Airtable.
      showStatus("valid", "SCAN SENT ✓", ticketId);

      setTimeout(() => {
        scanningLocked = false;
        document.getElementById("status").style.display = "none";
      }, 2500);

    } catch (err) {
      showStatus("invalid", "SCAN FAILED", ticketId);
      scanningLocked = false;
    }
  }

  function manualCheck() {
    const value = document.getElementById("manualTicket").value;
    sendToZapier(value);
  }

  async function startScanner() {
    if (ZAPIER_WEBHOOK_URL ===  WEBHOOK_URL_HERE
      showStatus("invalid", "Add your Zapier webhook URL first", "");
      return;
    }

    if (html5QrCode) return;

    html5QrCode = new Html5Qrcode("reader");

    try {
      await html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        decodedText => sendToZapier(decodedText),
        errorMessage => {}
      );
    } catch (err) {
      showStatus("invalid", "Camera could not start. Check browser permissions.", "");
      html5QrCode = null;
    }
  }

  async function stopScanner() {
    if (!html5QrCode) return;
    await html5QrCode.stop();
    html5QrCode.clear();
    html5QrCode = null;
  }
</script>
</body>
</html>
